{{ define "main" }}
  {{ $projects := .Site.GetPage "projects" }}
  {{ with $projects }}
    <h1>Projects</h1>
    {{ if .Pages }}
      <div class="projects-list">
        {{ range .Pages }}
          <div class="project-item">
            <h2 style="margin-bottom: 0;"><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
            <p>
              {{ .Params.description }}
            </p>
          </div>
        {{ end }}
      </div>
    {{ end }}
  {{ end }}
  
{{ end }}
