<section class="ascii-cat-section">
  <div class="ascii-cat-container">
    <div class="terminal-bar">
      <span class="dot red"></span>
      <span class="dot yellow"></span>
      <span class="dot green"></span>
      <span class="terminal-title">cat.gif</span>
    </div>
    <div class="ascii-stage">
      <pre id="asciiCat" class="ascii-cat" aria-label="ASCII cat — click to feed"></pre>
      <div class="scanline"></div>
    </div>
    <div class="ascii-footer">
      <button class="feed-btn" id="feedBtn" onclick="feedTheCat()">🐟 Feed the cat</button>
    </div>
  </div>
</section>

<script src="{{ "js/ascii-cat.js" | absURL }}" defer></script>
